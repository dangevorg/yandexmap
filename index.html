<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - Armenia Open Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Safe, client-side HUD dark mode filter that applies directly to public OpenStreetMap tiles */
        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 5px;
        }

        #custom-search {
            width: 220px;
            height: 32px;
            background: #111111;
            border: 1px solid #00FFCC;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        #custom-btn {
            height: 34px;
            padding: 0 15px;
            background: #00FFCC;
            color: #000000;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #suggestions-box {
            width: 240px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 180px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #222222;
            color: #00FFCC;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Type location (e.g. Tumo)..." autocomplete="off" oninput="handleTyping()">
            <button id="custom-btn" onclick="triggerManualSearch()">Go</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Yerevan center default
        let userMarker = null;
        let destMarker = null;
        let activeLine = null;
        let destCoords = null;
        let typingTimeout;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);

            // FIXED URL: Running standard, completely open public tile delivery network (no proxy bans)
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            startLiveTracking();
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = L.circleMarker(userCoords, {
                            color: '#00FFCC', fillColor: '#00FFCC', fillOpacity: 1, radius: 6
                        }).addTo(map);
                        map.setView(userCoords);
                    } else {
                        userMarker.setLatLng(userCoords);
                    }

                    if (destCoords) {
                        if (activeLine) map.removeLayer(activeLine);
                        activeLine = L.polyline([userCoords, destCoords], {
                            color: '#FF3366', weight: 5, opacity: 0.95
                        }).addTo(map);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function handleTyping() {
            clearTimeout(typingTimeout);
            const query = document.getElementById('custom-search').value.trim();
            const box = document.getElementById('suggestions-box');

            if (query.length < 2) {
                box.style.display = 'none';
                return;
            }

            typingTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        if (data && data.length > 0) {
                            box.style.display = 'block';
                            data.forEach(item => {
                                let div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.innerText = item.display_name.split(',')[0] + (item.display_name.split(',')[1] ? ', ' + item.display_name.split(',')[1] : '');
                                div.onclick = () => selectDestination([parseFloat(item.lat), parseFloat(item.lon)], item.display_name);
                                box.appendChild(div);
                            });
                        } else {
                            box.style.display = 'none';
                        }
                    }).catch(() => {});
            }, 400);
        }

        function selectDestination(coords, displayName) {
            destCoords = coords;
            document.getElementById('custom-search').value = displayName.split(',')[0];
            document.getElementById('suggestions-box').style.display = 'none';
            drawHUDRoute();
        }

        function triggerManualSearch() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        drawHUDRoute();
                    }
                });
        }

        function drawHUDRoute() {
            if (!destCoords) return;

            if (destMarker) map.removeLayer(destMarker);
            if (activeLine) map.removeLayer(activeLine);

            destMarker = L.circleMarker(destCoords, {
                color: '#FF3366', fillColor: '#000000', fillOpacity: 0.4, radius: 8, weight: 3
            }).addTo(map);

            activeLine = L.polyline([userCoords, destCoords], {
                color: '#FF3366', weight: 6, opacity: 0.95
            }).addTo(map);

            map.fitBounds(L.polyline([userCoords, destCoords]).getBounds(), { padding: [40, 40] });
        }

        window.onload = initMap;
    </script>
</body>
</html>
