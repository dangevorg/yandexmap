<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - Multi Route Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 5px;
        }

        #custom-search {
            width: 150px;
            height: 32px;
            background: #111111;
            border: 1px solid #00FFCC;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn {
            height: 34px;
            padding: 0 10px;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        #custom-btn { background: #00FFCC; color: #000000; }
        #lock-btn { background: #222222; color: #FF3366; border: 1px solid #FF3366; }
        .active-lock { background: #FF3366 !important; color: #000000 !important; }

        #suggestions-box {
            width: 240px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }
        .suggestion-item:hover { background: #222222; color: #00FFCC; }

        /* The Custom Navigation Arrow styling */
        .nav-arrow {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 26px solid #00FFCC; /* Bright neon arrow */
            filter: drop-shadow(0px 0px 6px #00FFCC);
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Search (e.g. Tumo)..." autocomplete="off" oninput="handleTyping()">
            <button id="custom-btn" class="btn" onclick="triggerManualSearch()">Go</button>
            <button id="lock-btn" class="btn" onclick="toggleLockView()">Follow</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; 
        let userMarker = null;
        let destMarker = null;
        let destCoords = null;
        let typingTimeout;
        let isLockedView = false;
        
        let availableRoutes = []; // Stores alternative routes
        let selectedRouteIndex = 0;
        let userHeading = 0;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            startLiveTracking();
            startCompassTracking();
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    // Creates or updates the native-style navigation arrow icon
                    const arrowIcon = L.divIcon({
                        className: 'nav-arrow-container',
                        html: `<div id="arrow-element" class="nav-arrow" style="transform: rotate(${userHeading}deg);"></div>`,
                        iconSize: [24, 26],
                        iconAnchor: [12, 13]
                    });

                    if (!userMarker) {
                        userMarker = L.marker(userCoords, { icon: arrowIcon }).addTo(map);
                    } else {
                        userMarker.setLatLng(userCoords);
                    }

                    if (isLockedView) {
                        map.setView(userCoords, 17);
                    }

                    if (destCoords) {
                        calculateMultipleRoutes();
                    }
                }, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        // Monitors device hardware sensors to read heading/bearing orientation live
        function startCompassTracking() {
            window.addEventListener('deviceorientationabsolute', (e) => {
                if (e.alpha !== null) {
                    userHeading = 360 - e.alpha; // Computes compass heading angles
                    const el = document.getElementById('arrow-element');
                    if (el) el.style.transform = `rotate(${userHeading}deg)`;
                }
            }, true);
        }

        function toggleLockView() {
            isLockedView = !isLockedView;
            const btn = document.getElementById('lock-btn');
            if (isLockedView) {
                btn.classList.add('active-lock');
                btn.innerText = "Locked";
                map.setView(userCoords, 17);
            } else {
                btn.classList.remove('active-lock');
                btn.innerText = "Follow";
            }
        }

        function calculateMultipleRoutes() {
            if (!destCoords) return;

            // FIXED URL: Passing alternatives=true option to compute separate street layers
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${userCoords[1]},${userCoords[0]};${destCoords[1]},${destCoords[0]}?geometries=geojson&alternatives=true`;

            fetch(osrmUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        // Clear old track lines off the map layout array
                        availableRoutes.forEach(r => map.removeLayer(r.layer));
                        availableRoutes = [];

                        // Define colors for primary vs alternative options
                        const routeColors = ['#00FFCC', '#9933FF', '#AAAAAA']; 

                        data.routes.forEach((route, idx) => {
                            const geometry = route.geometry.coordinates;
                            const leafCoordinates = geometry.map(coord => [coord[1], coord[0]]);

                            // Draw route line on map
                            let polyline = L.polyline(leafCoordinates, {
                                color: idx === selectedRouteIndex ? routeColors[0] : routeColors[Math.min(idx, 2)],
                                weight: idx === selectedRouteIndex ? 7 : 4,
                                opacity: idx === selectedRouteIndex ? 0.95 : 0.5,
                                interactive: true
                            }).addTo(map);

                            // Clicking a line changes your active navigation target route instantly
                            polyline.on('click', () => {
                                selectedRouteIndex = idx;
                                calculateMultipleRoutes(); // Redraws layout weights and focus states
                            });

                            availableRoutes.push({ index: idx, layer: polyline });
                        });

                        if (!isLockedView) {
                            map.fitBounds(availableRoutes[selectedRouteIndex].layer.getBounds(), { padding: [40, 40] });
                        }
                    }
                }).catch(() => {});
        }

        function handleTyping() {
            clearTimeout(typingTimeout);
            const query = document.getElementById('custom-search').value.trim();
            const box = document.getElementById('suggestions-box');
            if (query.length < 2) { box.style.display = 'none'; return; }

            typingTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        if (data && data.length > 0) {
                            box.style.display = 'block';
                            data.forEach(item => {
                                let div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.innerText = item.display_name.split(',')[0] + (item.display_name.split(',')[1] ? ', ' + item.display_name.split(',')[1] : '');
                                div.onclick = () => selectDestination([parseFloat(item.lat), parseFloat(item.lon)], item.display_name);
                                box.appendChild(div);
                            });
                        } else { box.style.display = 'none'; }
                    }).catch(() => {});
            }, 400);
        }

        function selectDestination(coords, displayName) {
            destCoords = coords;
            selectedRouteIndex = 0; // Reset focus to route 1
            document.getElementById('custom-search').value = displayName.split(',')[0];
            document.getElementById('suggestions-box').style.display = 'none';
            
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 6 }).addTo(map);

            calculateMultipleRoutes();
        }

        function triggerManualSearch() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 6 }).addTo(map);
                        calculateMultipleRoutes();
                    }
                });
        }

        window.onload = initMap;
    </script>
</body>
</html>
