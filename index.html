<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - SVG Arrow Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
            perspective: 800px; 
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tilt-3d {
            transform: translateY(-80px) scale(1.25) rotateX(55deg);
        }

        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #search-container {
            position: absolute;
            top: 85px; 
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 5px;
        }

        #custom-search {
            width: 150px;
            height: 32px;
            background: #111111;
            border: 1px solid #444444;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn {
            height: 34px;
            padding: 0 10px;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        #custom-btn { 
            background: #333333; 
            color: #FFFFFF; 
            border: 1px solid #555555;
        }

        #lock-btn { 
            background: #111111; 
            color: #FF6600; 
            border: 1px solid #FF6600; 
        }
        
        .active-lock { 
            background: #FF6600 !important; 
            color: #000000 !important; 
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.6);
        }

        #suggestions-box {
            width: 240px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }
        .suggestion-item:hover { background: #222222; color: #FF6600; }

        /* FIXED: Redesigned SVG Arrow Wrapper */
        .nav-arrow-svg {
            width: 32px;
            height: 32px;
            fill: #444444; /* Dark Gray */
            filter: drop-shadow(0px 1px 3px rgba(255, 255, 255, 0.3));
            transition: transform 0.1s linear;
        }

        #hud-stats-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 600px;
            height: 70px;
            background-color: rgba(10, 10, 10, 0.9);
            border-bottom: 2px solid #333333;
            z-index: 2000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .stat-element { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: #FF6600; } 
        .stat-lbl { font-size: 11px; color: #888888; text-transform: uppercase; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="hud-stats-bar">
        <div class="stat-element">
            <div id="hud-elapsed" class="stat-val">00:00</div>
            <div class="stat-lbl">On Road</div>
        </div>
        <div class="stat-element">
            <div id="hud-remaining" class="stat-val">-- min</div>
            <div class="stat-lbl">Left</div>
        </div>
        <div class="stat-element">
            <div id="hud-distance" class="stat-val">-- km</div>
            <div class="stat-lbl">Distance</div>
        </div>
    </div>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Search places..." autocomplete="off" oninput="handleTyping()">
            <button id="custom-btn" class="btn" onclick="triggerManualSearch()">Go</button>
            <button id="lock-btn" class="btn" onclick="toggleLockView()">Follow</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; 
        let userMarker = null;
        let destMarker = null;
        let destCoords = null;
        let activeRouteLine = null;
        let typingTimeout;
        let isLockedView = false;
        let userHeading = 0;
        let tripStartTime = null;
        let elapsedInterval = null;

        const armeniaViewbox = "43.4,41.4,46.6,38.8";

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            startLiveTracking();
            startCompassTracking();
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    // FIXED: Injected inline SVG format for authentic navigator arrow shape
                    const arrowIcon = L.divIcon({
                        className: 'nav-arrow-container',
                        html: `
                            <svg id="arrow-element" class="nav-arrow-svg" viewBox="0 0 24 24" style="transform: rotate(${userHeading}deg);">
                                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                            </svg>
                        `,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    });

                    if (!userMarker) {
                        userMarker = L.marker(userCoords, { icon: arrowIcon }).addTo(map);
                    } else {
                        userMarker.setLatLng(userCoords);
                    }

                    if (isLockedView) {
                        const offsetLat = userCoords[0] + 0.0015; 
                        map.setView([offsetLat, userCoords[1]], 17, { animate: false });
                    }

                    if (destCoords) {
                        calculateRoute();
                    }
                }, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        function startCompassTracking() {
            window.addEventListener('deviceorientationabsolute', (e) => {
                if (e.alpha !== null) {
                    userHeading = 360 - e.alpha; 
                    const el = document.getElementById('arrow-element');
                    if (el) el.style.transform = `rotate(${userHeading}deg)`;
                }
            }, true);
        }

        function toggleLockView() {
            isLockedView = !isLockedView;
            const btn = document.getElementById('lock-btn');
            const mapContainer = document.getElementById('map');
            
            if (isLockedView) {
                btn.classList.add('active-lock');
                btn.innerText = "Locked";
                mapContainer.classList.add('tilt-3d'); 
                const offsetLat = userCoords[0] + 0.0015;
                map.setView([offsetLat, userCoords[1]], 17);
            } else {
                btn.classList.remove('active-lock');
                btn.innerText = "Follow";
                mapContainer.classList.remove('tilt-3d'); 
                map.setView(userCoords, 16);
            }
        }

        function calculateRoute() {
            if (!destCoords) return;

            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${userCoords[1]},${userCoords[0]};${destCoords[1]},${destCoords[0]}?geometries=geojson`;

            fetch(osrmUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        const route = data.routes[0];
                        const geometry = route.geometry.coordinates;
                        const leafCoordinates = geometry.map(coord => [coord[1], coord[0]]);

                        const distanceKm = (route.distance / 1000).toFixed(1);
                        const durationMin = Math.round(route.duration / 60);

                        let displayTime = `${durationMin} min`;
                        if (durationMin >= 60) {
                            const hours = Math.floor(durationMin / 60);
                            const remainingMins = durationMin % 60;
                            displayTime = remainingMins > 0 ? `${hours}h ${remainingMins}m` : `${hours}h`;
                        }

                        document.getElementById('hud-distance').innerText = `${distanceKm} km`;
                        document.getElementById('hud-remaining').innerText = displayTime;

                        if (activeRouteLine) map.removeLayer(activeRouteLine);

                        activeRouteLine = L.polyline(leafCoordinates, {
                            color: '#00FF33',
                            weight: 3, 
                            opacity: 0.95
                        }).addTo(map);

                        if (!isLockedView) {
                            map.fitBounds(activeRouteLine.getBounds(), { padding: [40, 40] });
                        }
                    }
                }).catch(() => {});
        }

        function startTripTimer() {
            if (elapsedInterval) clearInterval(elapsedInterval);
            tripStartTime = Date.now();
            elapsedInterval = setInterval(() => {
                const totalSeconds = Math.floor((Date.now() - tripStartTime) / 1000);
                const totalMinutes = Math.floor(totalSeconds / 60);
                const seconds = (totalSeconds % 60).toString().padStart(2, '0');
                
                if (totalMinutes >= 60) {
                    const hours = Math.floor(totalMinutes / 60);
                    const minutes = (totalMinutes % 60).toString().padStart(2, '0');
                    document.getElementById('hud-elapsed').innerText = `${hours}:${minutes}:${seconds}`;
                } else {
                    const minutes = totalMinutes.toString().padStart(2, '0');
                    document.getElementById('hud-elapsed').innerText = `${minutes}:${seconds}`;
                }
            }, 1000);
        }

        function handleTyping() {
            clearTimeout(typingTimeout);
            const query = document.getElementById('custom-search').value.trim();
            const box = document.getElementById('suggestions-box');
            if (query.length < 2) { box.style.display = 'none'; return; }

            typingTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&viewbox=${armeniaViewbox}&bounded=0&q=${encodeURIComponent(query)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        if (data && data.length > 0) {
                            box.style.display = 'block';
                            data.forEach(item => {
                                let div = document.createElement('div');
                                div.className = 'suggestion-item';
                                let cleanName = item.display_name.split(',')[0];
                                let cleanContext = item.display_name.split(',')[1] ? ', ' + item.display_name.split(',')[1] : '';
                                div.innerText = cleanName + cleanContext;
                                
                                div.onclick = () => selectDestination([parseFloat(item.lat), parseFloat(item.lon)], item.display_name);
                                box.appendChild(div);
                            });
                        } else { box.style.display = 'none'; }
                    }).catch(() => {});
            }, 400);
        }

        function selectDestination(coords, displayName) {
            destCoords = coords;
            document.getElementById('custom-search').value = displayName.split(',')[0];
            document.getElementById('suggestions-box').style.display = 'none';
            
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 5 }).addTo(map);

            startTripTimer(); 
            calculateRoute();
        }

        function triggerManualSearch() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&viewbox=${armeniaViewbox}&bounded=0&q=${encodeURIComponent(query)}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 5 }).addTo(map);
                        startTripTimer();
                        calculateRoute();
                    }
                });
        }

        window.onload = initMap;
    </script>
</body>
</html>
