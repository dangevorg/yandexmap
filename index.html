<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glasses HUD</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
            pointer-events: none;
        }

        #map {
            width: 600px;
            height: 520px;
            background-color: #000000;
            pointer-events: none;
        }

        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(100%) contrast(100%);
        }

        [class*="ymaps-2-1-79-copyright"],
        [class*="ymaps-2-1-79-logo"],
        [class*="ymaps-2-1-79-balloon"],
        [class*="ymaps-2-1-79-route-panel"],
        [class*="ymaps-2-1-79-inside-sandbox"],
        [class*="ymaps-2-1-79-float-button"],
        [class*="ymaps-2-1-79-controls"],
        [class*="ymaps-2-1-79-map-copyrights-promo"],
        [class*="_suggest"],
        [class*="copyright"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        #map a {
            pointer-events: none !important;
            cursor: default !important;
        }

        #status-bar {
            height: 80px;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background-color: #111111;
            border-top: 2px solid #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sub-text {
            font-size: 14px;
            color: #aaaaaa;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status-bar">
        <div id="main-status">Initializing HUD...</div>
        <div id="sub-status" class="sub-text">Waiting for GPS...</div>
    </div>

    <script type="text/javascript">
        // 1) Kill ALL clicks on anchor tags anywhere on the page
        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a');
            if (anchor) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                return false;
            }
        }, true);

        // 2) MutationObserver: nuke any <a> tags Yandex injects into the map
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType !== 1) return;
                    const links = node.tagName === 'A'
                        ? [node]
                        : Array.from(node.querySelectorAll('a'));
                    links.forEach(function(a) {
                        a.removeAttribute('href');
                        a.style.pointerEvents = 'none';
                        a.style.cursor = 'default';
                    });
                    ['copyright', 'logo', 'balloon', 'float-button', 'copyrights-promo']
                        .forEach(function(keyword) {
                            if (node.className && typeof node.className === 'string' &&
                                node.className.includes(keyword)) {
                                node.style.display = 'none';
                            }
                            node.querySelectorAll('[class*="' + keyword + '"]').forEach(function(el) {
                                el.style.display = 'none';
                            });
                        });
                });
            });
        });

        observer.observe(document.body, { childList: true, subtree: true });

        // 3) Override window.open so Yandex can't open new tabs
        window.open = function() { return null; };

        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
        });

        // MAP LOGIC
        let map;
        let userCoords = [40.1792, 44.5152];
        let activeIndex = 0;
        let polylineTrack = null;

        const destinations = [
            { name: "Tracking Your Position", address: null },
            { name: "Heading: Republic Square", address: "Yerevan, Republic Square" },
            { name: "Heading: Cascade Complex", address: "Yerevan, Cascade" }
        ];

        ymaps.ready(init);

        function init() {
            map = new ymaps.Map("map", {
                center: userCoords,
                zoom: 15,
                controls: []
            }, {
                suppressMapOpenBlock: true,
                suppressObsoleteBrowserNotifier: true,
                yandexMapDisablePoiInteractivity: true,
                copyrightLogoVisible: false,
                copyrightPromoVisible: false,
                copyrightUaVisible: false
            });

            map.behaviors.disable(['scrollZoom', 'drag', 'dblClickZoom', 'rightMouseButtonMagnifier', 'multiTouch']);

            trackLocation();
        }

        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    function(position) {
                        userCoords = [position.coords.latitude, position.coords.longitude];
                        updateNavigation();
                    },
                    function() {
                        document.getElementById('main-status').innerText = "GPS Error";
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        function updateNavigation() {
            const currentTarget = destinations[activeIndex];

            if (polylineTrack) {
                map.geoObjects.remove(polylineTrack);
                polylineTrack = null;
            }

            if (!currentTarget.address) {
                map.setCenter(userCoords, 16);
                document.getElementById('main-status').innerText = currentTarget.name;
                document.getElementById('sub-status').innerText = "Press arrow keys to cycle targets";

                polylineTrack = new ymaps.Circle([userCoords, 15], {}, {
                    fillColor: "#FF3366",
                    strokeWidth: 0,
                    hasBalloon: false,
                    interactive: false
                });
                map.geoObjects.add(polylineTrack);
            } else {
                ymaps.route([userCoords, currentTarget.address], {
                    routingMode: 'auto'
                }).done(
                    function(res) {
                        let pathCoords = [];
                        let paths = res.getPaths();
                        for (let i = 0; i < paths.getLength(); i++) {
                            let segments = paths.get(i).getSegments();
                            for (let j = 0; j < segments.getLength(); j++) {
                                pathCoords = pathCoords.concat(segments.get(j).getCoordinates());
                            }
                        }

                        polylineTrack = new ymaps.Polyline(pathCoords, {}, {
                            strokeColor: "#00FFCC",
                            strokeWidth: 6,
                            hasBalloon: false,
                            interactive: false
                        });

                        map.geoObjects.add(polylineTrack);
                        map.setBounds(res.getBounds(), { checkZoomRange: true });

                        let duration = res.getPaths().get(0).getProperties().get("duration").text;
                        let distance = res.getPaths().get(0).getProperties().get("distance").text;

                        document.getElementById('main-status').innerText = currentTarget.name;
                        document.getElementById('sub-status').innerText = duration + ' (' + distance + ') away';
                    },
                    function() {
                        document.getElementById('main-status').innerText = "Routing Failure";
                    }
                );
            }
        }

        window.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight' || event.key === 'ArrowUp') {
                activeIndex = (activeIndex + 1) % destinations.length;
                updateNavigation();
            } else if (event.key === 'ArrowLeft' || event.key === 'ArrowDown') {
                activeIndex = (activeIndex - 1 + destinations.length) % destinations.length;
                updateNavigation();
            }
        });
    </script>
</body>
</html>
