<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD Free GPS Map</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
        }

        /* Dark HUD overlay filter */
        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Clean, tiny, unobtrusive search box */
        .ymaps-2-1-79-searchbox {
            width: 280px !important; 
            height: 36px !important;  
            margin: 10px !important;
        }
        
        .ymaps-2-1-79-searchbox-input__input {
            font-size: 14px !important; 
            height: 26px !important;
        }

        .ymaps-2-1-79-searchbox__button {
            height: 36px !important;
            width: 45px !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Fallback
        let userMarker = null;
        let activeLine = null;

        ymaps.ready(init);
        function init() {
            map = new ymaps.Map("map", {
                center: userCoords,
                zoom: 15,
                controls: ['searchControl'] 
            }, {
                suppressMapOpenBlock: true
            });

            // Track live positioning loop natively without Yandex servers
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = new ymaps.Placemark(userCoords, { iconCaption: "You" }, {
                            preset: 'islands#violetDotIcon'
                        });
                        map.geoObjects.add(userMarker);
                    } else {
                        userMarker.geometry.setCoordinates(userCoords);
                    }
                }, null, { enableHighAccuracy: true });
            }

            // Capture address coordinates and draw track natively
            let searchControl = map.controls.get('searchControl');
            searchControl.events.add('resultselect', function (e) {
                let index = e.get('index');
                searchControl.getResult(index).then(function (res) {
                    let destCoords = res.geometry.getCoordinates();
                    
                    // Clear any previous lines
                    if (activeLine) map.geoObjects.remove(activeLine);

                    // Draw a clean line directly from your feet to the destination
                    activeLine = new ymaps.Polyline([userCoords, destCoords], {
                        balloonContent: "Direct Track Line"
                    }, {
                        strokeColor: "#00FFCC", // Neon cyan HUD track line
                        strokeWidth: 6,
                        opacity: 0.8
                    });

                    map.geoObjects.add(activeLine);
                    
                    // Autofit map screen bounds dynamically
                    map.setBounds([userCoords, destCoords], { checkZoomRange: true, zoomMargin: 40 });
                });
            });
        }
    </script>
</body>
</html>
