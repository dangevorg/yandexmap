<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags required by Meta Ray-Ban Display to lock the viewport size -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glasses Yandex Map</title>
    
    <!-- Load Yandex Maps API (Replace YOUR_API_KEY if you have one, or use free tier) -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US&apikey=YOUR_API_KEY" type="text/javascript"></script>

    <style>
        /* Essential styles for additive micro-displays */
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000; /* Pure black is fully transparent on glasses */
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 540px;
            background-color: #000000;
        }

        /* Dark inversion filter to make the standard map look like an HUD overlay */
        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #status-bar {
            height: 60px;
            line-height: 60px;
            text-align: center;
            font-size: 20px; /* Large font for easy reading */
            font-weight: bold;
            background-color: #111111;
            border-top: 2px solid #333333;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status-bar" id="status">Loading GPS...</div>

    <script type="text/javascript">
        let map;
        let zoomLevel = 15;
        let currentCoords = [40.1792, 44.5152]; // Default fallback coordinates

        // Initialize Yandex Map
        ymaps.ready(init);
        function init() {
            map = new ymaps.Map("map", {
                center: currentCoords,
                zoom: zoomLevel,
                controls: [] // Remove standard zoom/search buttons to maximize screen real estate
            });

            // Add a high-contrast custom marker for your location
            myPlacemark = new ymaps.Placemark(currentCoords, {}, {
                preset: 'islands#redDotIcon'
            });
            map.geoObjects.add(myPlacemark);

            // Fetch live location from the paired phone
            getLocation();
        }

        function getLocation() {
            if (navigator.geolocation) {
                // Meta Ray-Ban displays support phone GPS relay via standard W3C API
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentCoords = [position.coords.latitude, position.coords.longitude];
                        map.setCenter(currentCoords, zoomLevel);
                        myPlacemark.geometry.setCoordinates(currentCoords);
                        document.getElementById('status-bar').innerText = "Location Fixed";
                    },
                    (error) => {
                        document.getElementById('status-bar').innerText = "GPS Error. Using Fallback.";
                    },
                    { timeout: 12000 } // Long timeout recommended for glasses initialization
                );
            } else {
                document.getElementById('status-bar').innerText = "GPS Not Supported";
            }
        }

        // Handle glasses input mechanics (Neural band or swipe/taps map to D-pad arrow keys)
        window.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'ArrowUp': // Zoom In
                    if (zoomLevel < 19) {
                        zoomLevel++;
                        map.setZoom(zoomLevel, {checkZoomRange: true});
                    }
                    break;
                case 'ArrowDown': // Zoom Out
                    if (zoomLevel > 1) {
                        zoomLevel--;
                        map.setZoom(zoomLevel, {checkZoomRange: true});
                    }
                    break;
                case 'Enter': // Refresh GPS position
                    document.getElementById('status-bar').innerText = "Updating...";
                    getLocation();
                    break;
            }
        });
    </script>
</body>
</html>
