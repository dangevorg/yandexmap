<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - 2GIS Armenia Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Transparent dark HUD filter applied over the 2GIS tile layouts */
        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 5px;
        }

        #custom-search {
            width: 220px;
            height: 32px;
            background: #111111;
            border: 1px solid #00FFCC;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        #custom-btn {
            height: 34px;
            padding: 0 15px;
            background: #00FFCC;
            color: #000000;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #suggestions-box {
            width: 240px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 180px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #222222;
            color: #00FFCC;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Search via 2GIS Data..." autocomplete="off" oninput="handleTyping()">
            <button id="custom-btn" onclick="triggerManualSearch()">Go</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Yerevan default
        let userMarker = null;
        let destMarker = null;
        let activeLine = null;
        let destCoords = null;
        let typingTimeout;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);

            // CHANGED: Routing Leaflet directly into the official, open-access 2GIS map servers
            L.tileLayer('https://tile{s}.maps.2gis.com/tiles?x={x}&y={y}&z={z}', {
                subdomains: ['0', '1', '2', '3'],
                maxZoom: 18,
                attribution: '© 2GIS'
            }).addTo(map);

            startLiveTracking();
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = L.circleMarker(userCoords, {
                            color: '#FF3366', fillColor: '#FF3366', fillOpacity: 1, radius: 8
                        }).addTo(map);
