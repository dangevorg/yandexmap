<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD Search Map</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
        }

        /* Inverts the map layout to high-contrast transparent dark mode for glasses */
        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Forces the Yandex Search Box UI to scale massive so you can easily type on it */
        .ymaps-2-1-79-searchbox {
            width: 560px !important;
            height: 60px !important;
            margin: 20px !important;
        }
        .ymaps-2-1-79-searchbox-input__input {
            font-size: 24px !important;
            height: 45px !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Yerevan Default Fallback

        ymaps.ready(init);
        function init() {
            // Re-enabling the 'searchControl' inside the map array framework
            map = new ymaps.Map("map", {
                center: userCoords,
                zoom: 14,
                controls: ['searchControl'] 
            }, {
                suppressMapOpenBlock: true
            });

            // Trigger phone GPS coordinates lookup
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    map.setCenter(userCoords, 15);
                    
                    // Put a flashing tracker mark at your exact feet location
                    let locationMarker = new ymaps.Placemark(userCoords, {}, {
                        preset: 'islands#violetDotIconWithCaption'
                    });
                    map.geoObjects.add(locationMarker);
                });
            }

            // Monitor search bar entries: Once you type a location, draw a route automatically
            let searchControl = map.controls.get('searchControl');
            searchControl.events.add('resultselect', function (e) {
                let index = e.get('index');
                searchControl.getResult(index).then(function (res) {
                    let destinationCoords = res.geometry.getCoordinates();
                    
                    // Wipe clean old trails
                    map.geoObjects.removeAll();

                    // Calculate the active pedestrian routing path
                    ymaps.route([userCoords, destinationCoords], {
                        routingMode: 'pedestrian'
                    }).done(function (route) {
                        route.options.set({
                            mapStateAutoApply: true,
                            routeActiveStrokeColor: "#00FFCC", // High visibility neon line
                            routeActiveStrokeWidth: 7
                        });
                        map.geoObjects.add(route);
                    });
                });
            });
        }
    </script>
</body>
</html>
