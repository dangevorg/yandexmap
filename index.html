<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - Armenia Real Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD style dark-inversion for glasses transparency */
        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        #search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 5px;
        }

        #custom-search {
            width: 220px;
            height: 32px;
            background: #111111;
            border: 1px solid #00FFCC;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        #custom-btn {
            height: 34px;
            padding: 0 15px;
            background: #00FFCC;
            color: #000000;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #suggestions-box {
            width: 240px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 180px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #222222;
            color: #00FFCC;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Search (e.g. Tumo)..." autocomplete="off" oninput="handleTyping()">
            <button id="custom-btn" onclick="triggerManualSearch()">Go</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Yerevan fallback
        let userMarker = null;
        let destMarker = null;
        let routeLine = null;
        let destCoords = null;
        let typingTimeout;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            startLiveTracking();
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                // watchPosition pings phone GPS constantly to track you as you walk
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = L.circleMarker(userCoords, {
                            color: '#00FFCC', fillColor: '#00FFCC', fillOpacity: 1, radius: 6
                        }).addTo(map);
                    } else {
                        userMarker.setLatLng(userCoords);
                    }

                    // Native tracking: Centers screen automatically as your physical position moves
                    if (!destCoords) {
                        map.setView(userCoords);
                    } else {
                        // Dynamically refresh road navigation calculation while walking
                        calculateRealStreetRoute();
                    }
                }, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        // Fetch street route metrics from the open routing server engine
        function calculateRealStreetRoute() {
            if (!destCoords) return;

            // Call OSRM public engine (Format is long,lat;long,lat)
            const osrmUrl = `https://router.project-osrm.org/route/v1/foot/${userCoords[1]},${userCoords[0]};${destCoords[1]},${destCoords[0]}?geometries=geojson`;

            fetch(osrmUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        // Extract array of coordinates mapping perfectly along the actual layout of streets
                        const geometry = data.routes[0].geometry.coordinates;
                        const leafCoordinates = geometry.map(coord => [coord[1], coord[0]]);

                        if (routeLine) map.removeLayer(routeLine);

                        // Draw real navigation road lines on layout
                        routeLine = L.polyline(leafCoordinates, {
                            color: '#00FFCC', weight: 6, opacity: 0.9
                        }).addTo(map);

                        // Auto adjust lens framing to focus on upcoming trail segments
                        map.setView(userCoords, 17);
                    }
                }).catch(() => {});
        }

        function handleTyping() {
            clearTimeout(typingTimeout);
            const query = document.getElementById('custom-search').value.trim();
            const box = document.getElementById('suggestions-box');

            if (query.length < 2) {
                box.style.display = 'none';
                return;
            }

            typingTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        if (data && data.length > 0) {
                            box.style.display = 'block';
                            data.forEach(item => {
                                let div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.innerText = item.display_name.split(',')[0] + (item.display_name.split(',')[1] ? ', ' + item.display_name.split(',')[1] : '');
                                div.onclick = () => selectDestination([parseFloat(item.lat), parseFloat(item.lon)], item.display_name);
                                box.appendChild(div);
                            });
                        } else {
                            box.style.display = 'none';
                        }
                    }).catch(() => {});
            }, 400);
        }

        function selectDestination(coords, displayName) {
            destCoords = coords;
            document.getElementById('custom-search').value = displayName.split(',')[0];
            document.getElementById('suggestions-box').style.display = 'none';
            
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.circleMarker(destCoords, {
                color: '#FF3366', fillColor: '#000000', fillOpacity: 0.5, radius: 7, weight: 3
            }).addTo(map);

            calculateRealStreetRoute();
        }

        function triggerManualSearch() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 7 }).addTo(map);
                        calculateRealStreetRoute();
                    }
                });
        }

        window.onload = initMap;
    </script>
</body>
</html>
