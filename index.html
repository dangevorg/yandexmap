<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD Navigator + Voice</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000; 
            color: #00FFCC; 
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            overflow: hidden;
            pointer-events: none; 
        }

        #hidden-map { display: none !important; }

        #hud-container {
            width: 600px;
            height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            transition: background-color 0.3s ease;
        }

        /* Changes layout color state when microphone turns on */
        .listening-mode {
            background-color: #330000 !important; 
            color: #FF3333 !important;
        }

        #target-header {
            font-size: 28px;
            font-weight: 600;
            color: #FFFFFF;
            text-align: center;
            text-transform: uppercase;
        }

        #navigation-arrow {
            font-size: 140px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        #instruction-text {
            font-size: 32px;
            font-weight: 500;
            color: #FFFFFF;
            text-align: center;
            max-width: 500px;
            height: 80px;
        }

        #metrics-panel {
            width: 100%;
            display: flex;
            justify-content: space-around;
            border-top: 2px solid #222222;
            padding-top: 20px;
        }

        .metric-box { text-align: center; }
        .metric-value { font-size: 36px; font-weight: bold; color: #00FFCC; }
        .metric-label { font-size: 16px; color: #888888; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="hidden-map"></div>

    <div id="hud-container">
        <div id="target-header">HUD ACTIVE</div>
        <div id="navigation-arrow">▲</div>
        <div id="instruction-text">Tap Glasses Button to Dictate Address</div>
        
        <div id="metrics-panel">
            <div class="metric-box">
                <div id="metric-dist" class="metric-value">--</div>
                <div class="metric-label">Distance</div>
            </div>
            <div class="metric-box">
                <div id="metric-time" class="metric-value">--</div>
                <div class="metric-label">Remaining</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        let userCoords = [40.1792, 44.5152]; // Yerevan fallback
        let recognition;
        let isListening = false;

        ymaps.ready(init);
        function init() {
            setupVoiceRecognition();
            trackLocation();
        }

        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        userCoords = [position.coords.latitude, position.coords.longitude];
                    },
                    (error) => { console.log("GPS error"); },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        // Initialize Web Speech Engine
        function setupVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('instruction-text').innerText = "Voice Dictation Not Supported";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US'; // Change to your preferred language code if needed
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('hud-container').classList.add('listening-mode');
                document.getElementById('target-header').innerText = "LISTENING...";
                document.getElementById('instruction-text').innerText = "Speak your destination now...";
            };

            recognition.onerror = (e) => {
                resetHUDLayout();
                document.getElementById('instruction-text').innerText = "Voice Error. Try Again.";
            };

            recognition.onend = () => {
                resetHUDLayout();
            };

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript;
                calculateVoiceRoute(spokenText);
            };
        }

        function resetHUDLayout() {
            isListening = false;
            document.getElementById('hud-container').classList.remove('listening-mode');
            document.getElementById('target-header').innerText = "HUD ACTIVE";
        }

        function calculateVoiceRoute(targetAddress) {
            document.getElementById('instruction-text').innerText = "Mapping destination...";
            
            ymaps.route([userCoords, targetAddress], {
                routingMode: 'pedestrian'
            }).done(
                function (res) {
                    document.getElementById('target-header').innerText = targetAddress;
                    
                    let path = res.getPaths().get(0);
                    let duration = path.getProperties().get("duration").text;
                    let distance = path.getProperties().get("distance").text;
                    
                    document.getElementById('metric-dist').innerText = distance;
                    document.getElementById('metric-time').innerText = duration;

                    let segments = path.getSegments();
                    if (segments.getLength() > 0) {
                        let actionText = segments.get(0).getProperties().get("text");
                        let actionType = segments.get(0).getProperties().get("action");
                        
                        document.getElementById('instruction-text').innerText = actionText.replace(/<\/?[^>]+(>|$)/g, "");

                        let arrow = document.getElementById('navigation-arrow');
                        if (actionType === "left") arrow.innerText = "◀";
                        else if (actionType === "right") arrow.innerText = "▶";
                        else arrow.innerText = "▲";
                    }
                },
                function (error) {
                    document.getElementById('instruction-text').innerText = "Address not found. Tap to retry.";
                }
            );
        }

        // Map the physical glasses touch click (Enter Key) to trigger the microphone toggle
        window.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                if (!isListening && recognition) {
                    recognition.start();
                }
            }
        });
    </script>
</body>
</html>
