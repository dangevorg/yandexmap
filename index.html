<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - Fixed Traffic-Colored Multi-Route Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
            perspective: 800px; 
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tilt-3d {
            transform: translateY(-80px) scale(1.25) rotateX(55deg);
        }

        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .traffic-layer {
            filter: brightness(130%) contrast(120%);
        }

        #search-container {
            position: absolute;
            top: 135px; 
            left: 15px;
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            pointer-events: auto; 
        }

        #input-wrapper {
            display: flex;
            gap: 4px;
        }

        #custom-search {
            width: 120px;
            height: 32px;
            background: #111111;
            border: 1px solid #444444;
            color: #FFFFFF;
            padding: 0 8px;
            font-size: 13px;
            border-radius: 4px;
        }

        .btn {
            height: 34px;
            padding: 0 8px;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #custom-btn { background: #333333; color: #FFFFFF; border: 1px solid #555555; }
        
        #mic-btn {
            background: #222222;
            color: #FFFFFF;
            border: 1px solid #444444;
            width: 32px;
            padding: 0;
        }
        
        #mic-btn.listening {
            background: #FF3333 !important;
            border-color: #FF3333;
            animation: pulse-mic 1.2s infinite;
        }

        #history-btn {
            background: #222222;
            color: #888888;
            border: 1px solid #444444;
            width: 32px;
            padding: 0;
        }
        .active-history-btn {
            color: #FF6600 !important;
            border-color: #FF6600 !important;
        }

        @keyframes pulse-mic {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #lock-btn { background: #111111; color: #FF6600; border: 1px solid #FF6600; }
        .active-lock { background: #FF6600 !important; color: #000000 !important; box-shadow: 0 0 10px rgba(255, 102, 0, 0.6); }

        #suggestions-box {
            width: 250px;
            background: #111111;
            border: 1px solid #333333;
            max-height: 180px;
            overflow-y: auto;
            border-radius: 4px;
            margin-top: 2px;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            font-size: 13px;
            color: #BBBBBB;
            border-bottom: 1px solid #222222;
            cursor: pointer;
        }
        
        .suggestion-item.selected, .suggestion-item:hover { 
            background: #222222; 
            color: #FF6600; 
        }

        .history-item { color: #AA6600; }
        .history-item::before { content: "🕒 "; }

        #virtual-keyboard {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 600px;
            background: rgba(15, 15, 15, 0.95);
            border-top: 2px solid #333333;
            padding: 10px;
            box-sizing: border-box;
            z-index: 3000;
            display: none; 
            flex-direction: column;
            gap: 5px;
        }

        .keyboard-row { display: flex; justify-content: center; gap: 4px; }
        .key {
            background: #222222; border: 1px solid #444444; color: #FFFFFF; padding: 10px 0;
            width: 48px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; user-select: none;
        }
        .key:active { background: #FF6600; color: #000000; }
        .key.wide { width: 100px; }
        .key.space { width: 220px; }

        .nav-arrow-svg {
            width: 32px; height: 32px; fill: #444444; 
            filter: drop-shadow(0px 1px 3px rgba(255, 255, 255, 0.3));
            transition: transform 0.1s linear;
        }

        #hud-stats-bar {
            position: absolute; top: 0; left: 0; width: 600px; height: 70px;
            background-color: rgba(10, 10, 10, 0.9); border-bottom: 2px solid #333333; z-index: 2000;
            display: flex; justify-content: space-around; align-items: center; box-sizing: border-box; padding: 0 10px;
        }
        .stat-element { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: #FF6600; } 
        .stat-lbl { font-size: 11px; color: #888888; text-transform: uppercase; margin-top: 2px; }

        #route-options-panel {
            position: absolute;
            top: 72px;
            left: 0;
            width: 600px;
            height: 50px;
            background: rgba(5, 5, 5, 0.85);
            border-bottom: 1px solid #222222;
            z-index: 2000;
            display: none; 
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .route-chip {
            padding: 6px 12px;
            background: #151515;
            border: 1px solid #444444;
            color: #888888;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .route-chip.selected-route {
            background: #FF6600 !important;
            color: #000000 !important;
            border-color: #FF6600 !important;
            box-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
        }
    </style>
</head>
<body>

    <div id="hud-stats-bar">
        <div class="stat-element">
            <div id="hud-elapsed" class="stat-val">00:00</div>
            <div class="stat-lbl">On Road</div>
        </div>
        <div class="stat-element">
            <div id="hud-remaining" class="stat-val">-- min</div>
            <div class="stat-lbl">Left</div>
        </div>
        <div class="stat-element">
            <div id="hud-distance" class="stat-val">-- km</div>
            <div class="stat-lbl">Distance</div>
        </div>
    </div>

    <div id="route-options-panel"></div>

    <div id="search-container">
        <div id="input-wrapper">
            <input type="text" id="custom-search" placeholder="Search..." autocomplete="off" oninput="handleTyping()">
            <button id="history-btn" class="btn" onclick="toggleHistoryMenu()" title="Search History">🕒</button>
            <button id="mic-btn" class="btn" onclick="toggleVoiceDictation()" title="Voice Search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
            <button id="custom-btn" class="btn" onclick="triggerManualSearch()">Go</button>
            <button id="lock-btn" class="btn" onclick="toggleLockView()">Follow</button>
        </div>
        <div id="suggestions-box"></div>
    </div>

    <div id="virtual-keyboard">
        <div class="keyboard-row">
            <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div><div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div><div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div><div class="key" onclick="pressKey('0')">0</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="pressKey('q')">Q</div><div class="key" onclick="pressKey('w')">W</div><div class="key" onclick="pressKey('e')">E</div><div class="key" onclick="pressKey('r')">R</div><div class="key" onclick="pressKey('t')">T</div><div class="key" onclick="pressKey('y')">Y</div><div class="key" onclick="pressKey('u')">U</div><div class="key" onclick="pressKey('i')">I</div><div class="key" onclick="pressKey('o')">O</div><div class="key" onclick="pressKey('p')">P</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="pressKey('a')">A</div><div class="key" onclick="pressKey('s')">S</div><div class="key" onclick="pressKey('d')">D</div><div class="key" onclick="pressKey('f')">F</div><div class="key" onclick="pressKey('g')">G</div><div class="key" onclick="pressKey('h')">H</div><div class="key" onclick="pressKey('j')">J</div><div class="key" onclick="pressKey('k')">K</div><div class="key" onclick="pressKey('l')">L</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="pressKey('z')">Z</div><div class="key" onclick="pressKey('x')">X</div><div class="key" onclick="pressKey('c')">C</div><div class="key" onclick="pressKey('v')">V</div><div class="key" onclick="pressKey('b')">B</div><div class="key" onclick="pressKey('n')">N</div><div class="key" onclick="pressKey('m')">M</div><div class="key wide" onclick="pressKey('backspace')">←</div>
        </div>
        <div class="keyboard-row">
            <div class="key space" onclick="pressKey(' ')">Space</div><div class="key wide" style="background:#FF6600; color:#000;" onclick="pressKey('enter')">Done</div>
        </div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        const TOMTOM_KEY = "jeXPT9KCLIJWZ5S3Hy8aHjuK6h2Sokoj"; 

        let map;
        let userCoords = [40.1792, 44.5152]; 
        let userMarker = null;
        let destMarker = null;
        let destCoords = null;
        
        let routeLayersArray = [];
        let fetchedRoutesData = [];
        let currentlySelectedRouteIndex = 0;

        let trafficTileLayer = null; 
        let typingTimeout;
        let isLockedView = false;
        let userHeading = 0;
        let tripStartTime = null;
        let elapsedInterval = null;

        let currentFocusIndex = -1;
        let isHistoryOpen = false; 
        const armeniaViewbox = "43.4,41.4,46.6,38.8";

        let recognition = null;
        let isListening = false;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(userCoords, 16);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            trafficTileLayer = L.tileLayer(`https://{s}.api.tomtom.com/traffic/map/4/tile/flow/absolute/{z}/{x}/{y}.png?key=${TOMTOM_KEY}`, {
                subdomains: ['a', 'b', 'c', 'd'],
                opacity: 0.8,
                maxZoom: 18,
                className: 'traffic-layer'
            }).addTo(map);

            startLiveTracking();
            startCompassTracking();
            setupGestureEventListeners();
            initVoiceRecognition();
        }

        const searchInput = document.getElementById('custom-search');
        const keyboard = document.getElementById('virtual-keyboard');
        
        searchInput.addEventListener('focus', () => { 
            keyboard.style.display = 'flex'; 
            closeHistoryMenu(); 
        });
        
        function pressKey(char) {
            if (char === 'backspace') {
                searchInput.value = searchInput.value.slice(0, -1);
                handleTyping();
            } else if (char === 'enter') {
                keyboard.style.display = 'none';
                triggerManualSearch();
            } else {
                searchInput.value += char;
                handleTyping();
            }
        }

        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-btn').classList.add('listening');
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('mic-btn').classList.remove('listening');
            };
            recognition.onresult = (event) => {
                searchInput.value = event.results[0][0].transcript;
                keyboard.style.display = 'none';
                closeHistoryMenu();
                handleTyping(); 
            };
        }

        function toggleVoiceDictation() {
            if (!recognition) return;
            if (isListening) recognition.stop(); else recognition.start();
        }

        function setupGestureEventListeners() {
            document.addEventListener('keydown', (e) => {
                const box = document.getElementById('suggestions-box');
                const items = box.getElementsByClassName('suggestion-item');
                
                if (box.style.display === 'block' && items.length > 0) {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        currentFocusIndex++;
                        if (currentFocusIndex >= items.length) currentFocusIndex = 0;
                        updateSuggestionHighlight(items);
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                        e.preventDefault();
                        currentFocusIndex--;
                        if (currentFocusIndex < 0) currentFocusIndex = items.length - 1;
                        updateSuggestionHighlight(items);
                    } 
                    else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (currentFocusIndex > -1 && currentFocusIndex < items.length) {
                            items[currentFocusIndex].click(); 
                        }
                    }
                } else {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        toggleLockView();
                    }
                }
            });
        }

        function updateSuggestionHighlight(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('selected');
            }
            if (currentFocusIndex > -1) {
                items[currentFocusIndex].classList.add('selected');
                items[currentFocusIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        function toggleHistoryMenu() {
            if (isHistoryOpen) closeHistoryMenu(); else openHistoryMenu();
        }

        function openHistoryMenu() {
            isHistoryOpen = true;
            keyboard.style.display = 'none'; 
            document.getElementById('history-btn').classList.add('active-history-btn');
            
            const box = document.getElementById('suggestions-box');
            let history = JSON.parse(localStorage.getItem('nav_history')) || [];
            
            if (history.length === 0) {
                box.innerHTML = '<div class="suggestion-item" style="cursor:default;">No history logs yet</div>';
                box.style.display = 'block';
                return;
            }

            box.innerHTML = '';
            currentFocusIndex = -1;
            box.style.display = 'block';

            history.forEach(item => {
                let div = document.createElement('div');
                div.className = 'suggestion-item history-item';
                div.innerText = item.name;
                div.onclick = () => selectDestination(item.coords, item.name);
                box.appendChild(div);
            });
        }

        function closeHistoryMenu() {
            isHistoryOpen = false;
            document.getElementById('history-btn').classList.remove('active-history-btn');
            document.getElementById('suggestions-box').style.display = 'none';
        }

        function saveToHistory(name, coords) {
            let history = JSON.parse(localStorage.getItem('nav_history')) || [];
            history = history.filter(item => item.name !== name);
            history.unshift({ name: name, coords: coords });
            if (history.length > 10) history.pop(); 
            localStorage.setItem('nav_history', JSON.stringify(history));
        }

        function startLiveTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    const arrowIcon = L.divIcon({
                        className: 'nav-arrow-container',
                        html: `
                            <svg id="arrow-element" class="nav-arrow-svg" viewBox="0 0 24 24" style="transform: rotate(${userHeading}deg);">
                                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                            </svg>
                        `,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    });

                    if (!userMarker) {
                        userMarker = L.marker(userCoords, { icon: arrowIcon }).addTo(map);
                    } else {
                        userMarker.setLatLng(userCoords);
                    }

                    if (isLockedView) {
                        const offsetLat = userCoords[0] + 0.0015; 
                        map.setView([offsetLat, userCoords[1]], 17, { animate: false });
                    }

                    if (destCoords) {
                        calculateRoute();
                    }
                }, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        function startCompassTracking() {
            window.addEventListener('deviceorientationabsolute', (e) => {
                if (e.alpha !== null) {
                    userHeading = 360 - e.alpha; 
                    const el = document.getElementById('arrow-element');
                    if (el) el.style.transform = `rotate(${userHeading}deg)`;
                }
            }, true);
        }

        function toggleLockView() {
            isLockedView = !isLockedView;
            const btn = document.getElementById('lock-btn');
            const mapContainer = document.getElementById('map');
            
            if (isLockedView) {
                btn.classList.add('active-lock');
                btn.innerText = "Locked";
                mapContainer.classList.add('tilt-3d'); 
                const offsetLat = userCoords[0] + 0.0015;
                map.setView([offsetLat, userCoords[1]], 17);
            } else {
                btn.classList.remove('active-lock');
                btn.innerText = "Follow";
                mapContainer.classList.remove('tilt-3d'); 
                map.setView(userCoords, 16);
            }
        }

        function calculateRoute() {
            if (!destCoords) return;

            const tomTomUrl = `https://api.tomtom.com/routing/1/calculateRoute/${userCoords[0]},./${userCoords[1]}:${destCoords[0]},${destCoords[1]}/json?key=${TOMTOM_KEY}&traffic=true&departAt=now&maxAlternatives=2`;

            fetch(tomTomUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        routeLayersArray.forEach(l => map.removeLayer(l));
                        routeLayersArray = [];
                        fetchedRoutesData = data.routes;

                        const panel = document.getElementById('route-options-panel');
                        panel.innerHTML = '';
                        panel.style.display = 'flex';

                        data.routes.forEach((route, idx) => {
                            const distanceKm = (route.summary.lengthInMeters / 1000).toFixed(1);
                            const durationMin = Math.round(route.summary.travelTimeInSeconds / 60);
                            
                            // FIXED: Use explicit live traffic delay seconds to calculate robust color thresholds across alternative branches
                            const trafficDelay = route.summary.trafficDelayInSeconds || 0;
                            const totalDrivingTime = route.summary.travelTimeInSeconds;
                            
                            // Find percentage of total driving spent idling in static traffic delays
                            const delayRatio = trafficDelay / totalDrivingTime;

                            let routeColor = '#00FF33'; // Light Green: Little to no structural delays
                            if (delayRatio > 0.05 && delayRatio <= 0.18) {
                                routeColor = '#FFFF00'; // Yellow: Noticeable delays
                            } else if (delayRatio > 0.18 && delayRatio <= 0.35) {
                                routeColor = '#FF3333'; // Red: Solid traffic jam
                            } else if (delayRatio > 0.35) {
                                routeColor = '#8B0000'; // Dark Red: Complete standstill
                            }

                            let timeText = `${durationMin}m`;
                            if (durationMin >= 60) {
                                timeText = `${Math.floor(durationMin / 60)}h ${durationMin % 60}m`;
                            }

                            const chip = document.createElement('div');
                            chip.className = `route-chip ${idx === currentlySelectedRouteIndex ? 'selected-route' : ''}`;
                            chip.innerText = `Route ${String.fromCharCode(65 + idx)} (${timeText})`;
                            chip.onclick = () => selectActiveRouteIndex(idx);
                            panel.appendChild(chip);

                            const coordinates = route.legs[0].points.map(p => [p.latitude, p.longitude]);
                            
                            const polyline = L.polyline(coordinates, {
                                color: routeColor,
                                weight: idx === currentlySelectedRouteIndex ? 4 : 3,
                                opacity: idx === currentlySelectedRouteIndex ? 0.95 : 0.25,
                                zIndexOffset: idx === currentlySelectedRouteIndex ? 1000 : 0
                            }).addTo(map);

                            routeLayersArray.push(polyline);
                        });

                        const activeRoute = fetchedRoutesData[currentlySelectedRouteIndex];
                        const activeDist = (activeRoute.summary.lengthInMeters / 1000).toFixed(1);
                        const activeDuration = Math.round(activeRoute.summary.travelTimeInSeconds / 60);

                        let displayTime = `${activeDuration} min`;
                        if (activeDuration >= 60) {
                            displayTime = `${Math.floor(activeDuration / 60)}h ${activeDuration % 60}m`;
                        }

                        document.getElementById('hud-distance').innerText = `${activeDist} km`;
                        document.getElementById('hud-remaining').innerText = displayTime;

                        if (!isLockedView && routeLayersArray[currentlySelectedRouteIndex]) {
                            map.fitBounds(routeLayersArray[currentlySelectedRouteIndex].getBounds(), { padding: [40, 40] });
                        }
                    }
                }).catch(() => {});
        }

        function selectActiveRouteIndex(index) {
            currentlySelectedRouteIndex = index;
            calculateRoute();
        }

        function startTripTimer() {
            if (elapsedInterval) clearInterval(elapsedInterval);
            tripStartTime = Date.now();
            elapsedInterval = setInterval(() => {
                const totalSeconds = Math.floor((Date.now() - tripStartTime) / 1000);
                const totalMinutes = Math.floor(totalSeconds / 60);
                const seconds = (totalSeconds % 60).toString().padStart(2, '0');
                
                if (totalMinutes >= 60) {
                    const hours = Math.floor(totalMinutes / 60);
                    const minutes = (totalMinutes % 60).toString().padStart(2, '0');
                    document.getElementById('hud-elapsed').innerText = `${hours}:${minutes}:${seconds}`;
                } else {
                    const minutes = totalMinutes.toString().padStart(2, '0');
                    document.getElementById('hud-elapsed').innerText = `${minutes}:${seconds}`;
                }
            }, 1000);
        }

        function handleTyping() {
            closeHistoryMenu(); 
            clearTimeout(typingTimeout);
            const query = document.getElementById('custom-search').value.trim();
            const box = document.getElementById('suggestions-box');
            
            if (query.length < 2) { box.style.display = 'none'; return; }

            typingTimeout = setTimeout(() => {
                let forcedQuery = query;
                if (query.length <= 3) {
                    forcedQuery += ", Armenia";
                }

                fetch(`https://nominatim.openstreetmap.org/search?format=json&viewbox=${armeniaViewbox}&bounded=0&q=${encodeURIComponent(forcedQuery)}&limit=20`)
                    .then(res => res.json())
                    .then(data => {
                        box.innerHTML = '';
                        currentFocusIndex = -1; 
                        
                        if (data && data.length > 0) {
                            box.style.display = 'block';

                            let armeniaBucket = [];
                            let globalBucket = [];

                            data.forEach(item => {
                                const displayNameLower = item.display_name.toLowerCase();
                                const isArmenia = displayNameLower.includes('armenia') || 
                                                  displayNameLower.includes('հայաստան') || 
                                                  displayNameLower.includes('երևան') || 
                                                  displayNameLower.includes('yerevan');
                                
                                if (isArmenia) {
                                    armeniaBucket.push(item);
                                } else {
                                    globalBucket.push(item);
                                }
                            });

                            armeniaBucket.sort((a, b) => {
                                const qStr = query.toLowerCase();
                                const nameA = (a.display_name.split(',')[0] || '').toLowerCase();
                                const nameB = (b.display_name.split(',')[0] || '').toLowerCase();
                                return nameB.startsWith(qStr) - nameA.startsWith(qStr);
                            });

                            const finalizedResults = armeniaBucket.concat(globalBucket).slice(0, 5);

                            finalizedResults.forEach((item) => {
                                let div = document.createElement('div');
                                div.className = 'suggestion-item';
                                let cleanName = item.display_name.split(',')[0];
                                let cleanContext = item.display_name.split(',')[1] ? ', ' + item.display_name.split(',')[1] : '';
                                div.innerText = cleanName + cleanContext;
                                
                                div.onclick = () => selectDestination([parseFloat(item.lat), parseFloat(item.lon)], cleanName);
                                box.appendChild(div);
                            });
                        } else { box.style.display = 'none'; }
                    }).catch(() => {});
            }, 300);
        }

        function selectDestination(coords, displayName) {
            destCoords = coords;
            currentlySelectedRouteIndex = 0; 
            document.getElementById('custom-search').value = displayName;
            document.getElementById('suggestions-box').style.display = 'none';
            keyboard.style.display = 'none'; 
            
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 5 }).addTo(map);

            saveToHistory(displayName, coords); 
            startTripTimer(); 
            calculateRoute();
        }

        function triggerManualSearch() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&viewbox=${armeniaViewbox}&bounded=0&q=${encodeURIComponent(query)}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        let name = data[0].display_name.split(',')[0];
                        destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        currentlySelectedRouteIndex = 0;
                        if (destMarker) map.removeLayer(destMarker);
                        destMarker = L.circleMarker(destCoords, { color: '#FF3366', radius: 5 }).addTo(map);
                        
                        saveToHistory(name, destCoords);
                        startTripTimer();
                        calculateRoute();
                    }
                });
        }

        window.onload = initMap;
    </script>
</body>
</html>
