<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glasses Yandex HUD Navigator</title>
    
    <!-- Open access Yandex Maps API with routing capabilities -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000; 
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 520px;
            background-color: #000000;
        }

        /* High-contrast smart overlay for HUD transparent lens */
        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(100%) contrast(100%);
        }

        #status-bar {
            height: 80px;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background-color: #111111;
            border-top: 2px solid #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .sub-text {
            font-size: 14px;
            color: #aaaaaa;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status-bar">
        <div id="main-status">Initializing Map...</div>
        <div id="sub-status" class="sub-text">Waiting for GPS tracking...</div>
    </div>

    <script type="text/javascript">
        let map;
        let currentRoute = null;
        let userCoords = [40.1792, 44.5152]; // Default fallback location
        
        // --- DEFINE YOUR PRESETS HERE ---
        // Tip: You can change these addresses or coordinates to your actual Home/Work!
        const destinations = [
            { name: "My Current Position Only", coords: null },
            { name: "Heading: Home/Republic Square", address: "Yerevan, Republic Square" },
            { name: "Heading: Work / Cascade Complex", address: "Yerevan, Cascade" }
        ];
        let activeIndex = 0;

        ymaps.ready(init);
        function init() {
            map = new ymaps.Map("map", {
                center: userCoords,
                zoom: 15,
                controls: []
            });

            // Start actively watching location
            trackLocation();
        }

        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        userCoords = [position.coords.latitude, position.coords.longitude];
                        updateNavigation();
                    },
                    (error) => {
                        document.getElementById('main-status').innerText = "GPS Error";
                        document.getElementById('sub-status').innerText = "Make sure phone allows location.";
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                document.getElementById('main-status').innerText = "GPS Unusable";
            }
        }

        function updateNavigation() {
            const currentTarget = destinations[activeIndex];

            // Clear old routes off the screen
            if (currentRoute) {
                map.geoObjects.remove(currentRoute);
                currentRoute = null;
            }

            if (!currentTarget.coords && !currentTarget.address) {
                // Mode 1: Just show where I am right now
                map.setCenter(userCoords, 16);
                document.getElementById('main-status').innerText = "Tracking Position";
                document.getElementById('sub-status').innerText = "Tap/Swipe Left/Right to choose destination";
                
                // Add simple placeholder dot
                let singlePlacemark = new ymaps.Placemark(userCoords, {}, { preset: 'islands#redCircleDotIcon' });
                currentRoute = singlePlacemark;
                map.geoObjects.add(singlePlacemark);
            } else {
                // Mode 2: Draw an active route from user to destination
                document.getElementById('main-status').innerText = "Calculating Route...";
                document.getElementById('sub-status').innerText = `To: ${currentTarget.name}`;

                let targetPoint = currentTarget.coords ? currentTarget.coords : currentTarget.address;

                ymaps.route([userCoords, targetPoint], {
                    multiRoute: true,
                    routingMode: 'auto' // Set to 'pedestrian' if walking
                }).done(
                    function (route) {
                        currentRoute = route;
                        
                        // Customize look to look good on HUD
                        route.options.set({
                            mapStateAutoApply: true, // Autofits the map frame to show the whole line
                            routeActiveStrokeColor: "#00FFCC", // High contrast neon cyan line
                            routeActiveStrokeWidth: 6
                        });

                        map.geoObjects.add(currentRoute);
                        
                        // Grab real time metadata from Yandex engine
                        let activeRoute = route.getActiveRoute();
                        if (activeRoute) {
                            let duration = activeRoute.properties.get("duration").text;
                            let distance = activeRoute.properties.get("distance").text;
                            document.getElementById('main-status').innerText = `${currentTarget.name}`;
                            document.getElementById('sub-status').innerText = `${duration} (${distance}) away`;
                        }
                    },
                    function (error) {
                        document.getElementById('main-status').innerText = "Routing Failed";
                        document.getElementById('sub-status').innerText = "Could not map path to address.";
                    }
                );
            }
        }

        // Control mappings for glasses frame-taps / swipes
        window.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight' || event.key === 'ArrowUp') {
                // Cycle forward through targets
                activeIndex = (activeIndex + 1) % destinations.length;
                updateNavigation();
            } else if (event.key === 'ArrowLeft' || event.key === 'ArrowDown') {
                // Cycle backward through targets
                activeIndex = (activeIndex - 1 + destinations.length) % destinations.length;
                updateNavigation();
            }
        });
    </script>
</body>
</html>
