<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta HUD - Armenia Navigator</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?lang=en_US" type="text/javascript"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 600px;
            height: 600px;
            background-color: #000000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #search-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 5px;
            pointer-events: auto; 
        }

        #custom-search {
            width: 220px;
            height: 32px;
            background: #222222;
            border: 1px solid #00FFCC;
            color: #FFFFFF;
            padding: 0 10px;
            font-size: 14px;
            border-radius: 4px;
        }

        #custom-btn {
            height: 34px;
            padding: 0 15px;
            background: #00FFCC;
            color: #000000;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .ymaps-2-1-79-map {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="custom-search" placeholder="Enter street, city or venue...">
        <button id="custom-btn" onclick="searchLocation()">Go</button>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map;
        let userCoords = [40.1792, 44.5152]; // Default to Yerevan Center
        let userMarker = null;
        let activeLine = null;
        let destMarker = null;

        ymaps.ready(init);
        function init() {
            map = new ymaps.Map("map", {
                center: userCoords,
                zoom: 14,
                controls: [] 
            }, {
                suppressMapOpenBlock: true
            });

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userCoords = [position.coords.latitude, position.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = new ymaps.Placemark(userCoords, {}, { preset: 'islands#violetDotIcon' });
                        map.geoObjects.add(userMarker);
                    } else {
                        userMarker.geometry.setCoordinates(userCoords);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function searchLocation() {
            const query = document.getElementById('custom-search').value.trim();
            if (!query) return;

            document.getElementById('custom-btn').innerText = "...";

            // FIXED: Added countrycodes=am to force the search engine to look inside Armenia only
            fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=am&q=${encodeURIComponent(query)}&limit=1`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('custom-btn').innerText = "Go";
                    
                    if (data && data.length > 0) {
                        let destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];

                        if (activeLine) map.geoObjects.remove(activeLine);
                        if (destMarker) map.geoObjects.remove(destMarker);

                        destMarker = new ymaps.Placemark(destCoords, {}, { preset: 'islands#redDotIcon' });
                        map.geoObjects.add(destMarker);

                        activeLine = new ymaps.Polyline([userCoords, destCoords], {}, {
                            strokeColor: "#00FFCC", 
                            strokeWidth: 6,
                            opacity: 0.9
                        });
                        map.geoObjects.add(activeLine);

                        map.setBounds([userCoords, destCoords], { checkZoomRange: true, zoomMargin: 50 });
                    } else {
                        alert("Address not found in Armenia. Try adding the city name (e.g., 'Abovyan Street, Yerevan').");
                    }
                })
                .catch(err => {
                    document.getElementById('custom-btn').innerText = "Go";
                    alert("Search error. Please try again.");
                });
        }
    </script>
</body>
</html>
